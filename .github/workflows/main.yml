name: CI

on:
  push:
    branches:
      - '**'        # любой пуш в любую ветку
  pull_request:
    branches:
      - '**'        # любой PR в любую ветку

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 isort black mypy pytest pytest-asyncio httpx

      # Проверка только указанных файлов и папок
      - name: Lint with flake8
        run: flake8 --max-line-length=88 --extend-ignore=E203,W503 crud.py database.py main.py models.py schemas.py routers/

      - name: Check import sorting with isort
        run: isort --profile=black --check-only --diff crud.py database.py main.py models.py schemas.py routers/

      - name: Check formatting with black
        run: black --check --diff crud.py database.py main.py models.py schemas.py routers/

      - name: Type check with mypy
        run: mypy crud.py database.py main.py models.py schemas.py routers/

      - name: Test with pytest
        run: pytest tests/
